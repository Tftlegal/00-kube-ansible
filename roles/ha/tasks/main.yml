---
# Настройка HAProxy + Keepalived для HA доступа к API

- name: Настроить sysctl ip_nonlocal_bind
  ansible.posix.sysctl:
    name: "net.ipv4.ip_nonlocal_bind"
    value: "1"
    sysctl_set: true
    state: present
    ignoreerrors: true

- name: Установить пакеты HA [RedHat]
  when: ansible_os_family == "RedHat"
  ansible.builtin.dnf:
    name:
      - keepalived
      - haproxy
    state: present

- name: Скопировать keepalived.conf
  ansible.builtin.template:
    src: keepalived.j2
    dest: /etc/keepalived/keepalived.conf
    mode: '0600'
  notify: Restart keepalived

- name: Скопировать haproxy.cfg
  ansible.builtin.template:
    src: haproxy.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0600'
  register: haproxy_conf
  notify: Restart haproxy

- name: Enable and start keepalived and haproxy
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
    daemon_reload: yes
  loop:
    - keepalived
    - haproxy
